# Dependency update policy: this file should cover GitHub Actions and other explicitly owner-approved automation only.
# Do not add game/runtime dependencies, mods, plugins, resources, framework packs, container images, or vendored trees here without an explicit owner decision.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"

